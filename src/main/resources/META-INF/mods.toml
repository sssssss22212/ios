[[mods]]
    modId="decorativeblocks"
    version="3.0.0"
    displayName="Decorative Blocks"
    description='''
        Adds 107+ decorative blocks, 6 new ores, 17 new items with unique mechanics!
        - 6 new ores (Ruby, Sapphire, Mithril, Amethyst, Topaz, Onyx) spawn naturally
        - All ores smeltable in furnace/blast furnace
        - 60+ decorative blocks: neon lights, crystal glass, volcanic, ancient, magical
        - 10+ new items: wands, swords, pickaxes, shields with special abilities
        - All blocks craftable with recipes
        - Void Wand: teleports you up + slow falling
        - Ruby Staff: fire resistance + strength burst
        - Soul Compass: shows distance to spawn
        - Crystal Lens: night vision + shows block info
        - Mithril Shield: active blocking with resistance
    '''

